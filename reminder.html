<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Smart Task Scheduler</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    label {
      margin-top: 10px;
      display: block;
      font-size: 14px;
      color: #cbd5f5;
    }
    input, textarea, button {
      width: 100%;
      margin-top: 5px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: red;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background: #16a34a;
    }
    .required {
      color: #ef4444;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>📅 Task Scheduler</h2>

  <label>Task Title <span class="required">*</span></label>
  <input type="text" id="title" placeholder="Enter task title" required>

  <label>Description</label>
  <textarea id="desc" placeholder="Optional details"></textarea>

  <label>Date <span class="required">*</span></label>
  <input type="date" id="date" required>

  <label>Start Time <span class="required">*</span></label>
  <input type="time" id="startTime" required>

  <label>End Time <span class="required">*</span></label>
  <input type="time" id="endTime" required>

  <label>Reminder (minutes before)</label>
  <input type="number" id="reminder" placeholder="e.g. 10" value="10">

  <button onclick="createCalendarEvent()">Set Reminder</button>
</div>

<script>
function createCalendarEvent() {

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const date = document.getElementById("date").value;
  const startTime = document.getElementById("startTime").value;
  const endTime = document.getElementById("endTime").value;

  if (!title || !date || !startTime || !endTime) {
    alert("Please fill all required (*) fields");
    return;
  }

  const start = date.replace(/-/g, "") + "T" + startTime.replace(":", "") + "00";
  const end = date.replace(/-/g, "") + "T" + endTime.replace(":", "") + "00";

  const url = "https://calendar.google.com/calendar/render?action=TEMPLATE"
    + "&text=" + encodeURIComponent(title)
    + "&details=" + encodeURIComponent(desc)
    + "&dates=" + start + "/" + end
    + "&trp=false";

  window.open(url, "_blank");
}
</script>
</body>
</html>
